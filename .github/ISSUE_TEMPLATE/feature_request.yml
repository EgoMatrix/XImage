name: ✨ 功能建议
description: 提一个新功能、改进现有功能、或反馈使用体验
labels: ["enhancement", "needs-triage"]
title: "[FEATURE] "
body:
  - type: markdown
    attributes:
      value: |
        欢迎提建议！为了让作者更好评估，请尽量描述「场景」而不是「实现」。

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在做什么、需要 XImage 帮你解决什么问题？
      placeholder: |
        我经常要给小红书做 9 张连续封面，希望能一次生成一组风格统一的图，而不是手动重复 9 次。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你期望的形态（可选）
      description: 如果你已经有具体设想，可以描述，但不必给出实现细节。
      placeholder: |
        在「内容封面」模式新增「连续 N 张封面」选项，选 9 张后让 AI 生成一组共享风格的图。
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 你目前的替代方案是什么
      description: 没有这个功能时你怎么解决？
      placeholder: |
        手动改主题文字、跑 9 次，每次都要重新等。
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 对你的优先级
      options:
        - "🔥 高 - 没有它我的日常工作会很受影响"
        - "👍 中 - 有了更好"
        - "💡 低 - 一个 idea 而已"
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: 确认
      options:
        - label: 我已搜索过历史 Issue 与 Discussions，确认没有重复
          required: true
